<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PlayTesteur : plateforme d'entraide entre développeurs Android pour obtenir les 12 testeurs uniques exigés par Google Play.">
    <meta name="theme-color" content="#00e676">
    <title>PlayTesteur</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="toast-container"></div>

    <!-- Vidéo d'arrière-plan (position:fixed, hors du flux) -->
    <video class="bg-video" autoplay muted loop playsinline poster="bg-video-poster.jpg">
        <source src="bg-video.mp4" type="video/mp4">
    </video>

    <div class="app-container">
        <header class="app-header">
            <div class="logo-area">
                <img src="logo.png" alt="PlayTesteur" class="logo-icon-img">
                <div class="logo-text">
                    <span class="logo-primary">Play</span><span class="logo-secondary">Testeur</span>
                    <span class="badge-tag">Bêta</span>
                </div>
            </div>
            <nav class="main-nav" id="main-nav"></nav>
            <div class="header-actions" id="header-actions"></div>
        </header>

        <main class="view" id="view-root"></main>

        <footer class="app-footer">
            <script type='text/javascript' src='https://storage.ko-fi.com/cdn/widget/Widget_2.js'></script>
            <script type='text/javascript'>kofiwidget2.init('Support me on Ko-fi', '#72a4f2', 'E0J822UNFL');kofiwidget2.draw();</script>
        </footer>
    </div>

    <nav class="bottom-nav" id="bottom-nav"></nav>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
